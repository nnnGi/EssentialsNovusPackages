<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortcut Index | The Shortcut Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- We link the external script at the end of the body -->
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 font-bold text-xl cursor-pointer" onclick="showPage('home')">
                <span class="bg-blue-600 text-white p-1 rounded">📦</span>
                <span>ShortcutIndex</span>
            </div>
            <div class="flex gap-4">
                <button onclick="showPage('create')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 transition">Publish Shortcut</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        
        <!-- Page: Home (Gallery) -->
        <section id="page-home">
            <div class="mb-12 text-center">
                <h1 class="text-4xl font-extrabold mb-4">Find, install, and publish shortcuts.</h1>
                <input type="text" id="searchInput" placeholder="Search packages..." class="w-full max-w-xl px-6 py-4 rounded-2xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            </div>

            <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center py-20 text-slate-400 italic">Connecting to registry...</div>
            </div>
        </section>

        <!-- Page: Details -->
        <section id="page-details" class="hidden">
            <button onclick="showPage('home')" class="text-blue-600 mb-4 flex items-center gap-1 font-medium">← Back to Gallery</button>
            <div id="details-content" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                <!-- Details injected by JS -->
            </div>
        </section>

        <!-- Page: Create/Update -->
        <section id="page-create" class="hidden max-w-2xl mx-auto">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                <h2 id="form-title" class="text-2xl font-bold mb-6">Publish New Package</h2>
                
                <form id="packageForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Package ID (unique-slug)</label>
                            <input type="text" id="f-id" required placeholder="my-awesome-tool" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Display Name</label>
                            <input type="text" id="f-name" required placeholder="Super Tool" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Secret Key (To edit later)</label>
                        <input type="password" id="f-key" required placeholder="Keep this safe!" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Short Description</label>
                        <input type="text" id="f-short" required placeholder="A one-sentence summary" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Long Description</label>
                        <textarea id="f-long" required rows="4" placeholder="Explain what your shortcut does..." class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4 border-t pt-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Version</label>
                            <input type="text" id="f-version" required placeholder="1.0.0" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">iCloud Link</label>
                            <input type="url" id="f-link" required placeholder="https://icloud.com/..." class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Release Notes</label>
                        <input type="text" id="f-notes" placeholder="What changed?" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="pt-4 flex flex-col gap-2">
                        <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Publish to Registry</button>
                        <button type="button" onclick="showPage('home')" class="w-full text-slate-500 py-2">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <!-- Project Logic -->
    <script src="script.js"></script>
</body>
</html>
